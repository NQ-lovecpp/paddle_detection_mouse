# Y6: YOLOv3-MobileNetV1，全量数据，双卡，300 epoch + 自定义 Anchor（修复 Y5 的根本问题）
#
# Y5 失败根因：使用 COCO 全量预训练（含 head 权重），head 已为 COCO anchors 学习了
#   回归偏置；完全替换 anchor 后 head 无法重新校准，loss_xy 全程 ≈ 2.1 无法下降。
#
# Y6 修复方案：改用 MobileNetV1 backbone-only 预训练权重，Detection Head 从零初始化，
#   允许 head 从头学习新 anchor 的回归偏置；增加 epoch 到 300（同 PicoDet 标准）。
#
# 卡数：2    CUDA_VISIBLE_DEVICES=0,1
# bs=8/卡 = 16 total；lr = 0.01 × (16/64) = 0.0025
# milestones: 60%/80% × 300 = [180, 240]
_BASE_: ['../yolov3_my_dog_mouse_voc.yml']

save_dir: output/Y6_yolov3_custom_anchor_300e
epoch: 300
snapshot_epoch: 10
worker_num: 8

# backbone-only 权重：head 从零初始化，让 head 重新学习自定义 anchor 的回归偏置
# （不用 COCO 全量 yolov3_mobilenet_v1_270e_coco.pdparams，避免 Y5 的 head 冲突问题）
pretrain_weights: https://paddledet.bj.bcebos.com/models/pretrained/MobileNetV1_pretrained.pdparams

LearningRate:
  base_lr: 0.0025
  schedulers:
  - !PiecewiseDecay
    gamma: 0.1
    milestones:
    - 180
    - 240
  - !LinearWarmup
    start_factor: 0.
    steps: 1500

# 自定义 Anchors（来自 B1 K-means 聚类，avg_iou=0.780，608×608）
# 按面积升序：0~2=小目标，3~5=中目标，6~8=大目标
YOLOv3Head:
  anchors: [[77, 123], [94, 237], [149, 177],
            [152, 357], [235, 248], [252, 469],
            [371, 334], [383, 515], [524, 540]]
  anchor_masks: [[6, 7, 8], [3, 4, 5], [0, 1, 2]]
