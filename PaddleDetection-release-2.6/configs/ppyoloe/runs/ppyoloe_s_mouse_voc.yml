# A2: PP-YOLOE+-S，mouse_other_voc，双卡 30 epoch 微调
# 目的：引入更先进的 anchor-free 检测器，与 PicoDet 和 YOLOv3 形成对比点
# 卡数：2    CUDA_VISIBLE_DEVICES=0,1
# bs=8/卡 = 16 total（与 VOC 官方配置一致）；base_lr=0.001
# 注意：static_assigner_epoch=-1 避免在小数据集上用 TAL 的 warmup 赋值器
_BASE_: [
  '../../datasets/mouse_other_voc.yml',
  '../../runtime.yml',
  '../_base_/optimizer_80e.yml',
  '../_base_/ppyoloe_plus_crn.yml',
  '../_base_/ppyoloe_plus_reader.yml',
]

log_iter: 50
snapshot_epoch: 5
save_dir: output/A2_ppyoloe_s_mouse_voc
weights: output/A2_ppyoloe_s_mouse_voc/best_model

pretrain_weights: https://bj.bcebos.com/v1/paddledet/models/ppyoloe_plus_crn_s_80e_coco.pdparams
depth_mult: 0.33
width_mult: 0.50

TrainReader:
  batch_size: 8       # 8/卡 × 2 卡 = 16 total

EvalReader:
  batch_size: 4

epoch: 30
LearningRate:
  base_lr: 0.001
  schedulers:
    - !CosineDecay
      max_epochs: 36
    - !LinearWarmup
      start_factor: 0.
      epochs: 1

PPYOLOEHead:
  static_assigner_epoch: -1   # 小数据集直接用 TaskAligned Assigner
  nms:
    name: MultiClassNMS
    nms_top_k: 1000
    keep_top_k: 300
    score_threshold: 0.01
    nms_threshold: 0.7
